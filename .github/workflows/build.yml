name: Build Swift Store IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild -project Ksign.xcodeproj \
            -scheme Ksign \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/SwiftStore.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p build/Payload
          cp -r build/SwiftStore.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r SwiftStore.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SwiftStore-IPA
          path: build/SwiftStore.ipa
